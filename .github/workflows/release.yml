name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app (arm64 DMG + ZIP)
        run: |
          pnpm --filter @spool-lab/core build
          cd packages/app
          npx electron-vite build
          npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version packages/app/package.json)" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          DMG=$(find packages/app/dist -name "*.dmg" ! -name "*.blockmap" | head -1)
          mv "$DMG" "packages/app/dist/Spool-${VERSION}-arm64.dmg"

          ZIP=$(find packages/app/dist -name "*.zip" | head -1)
          mv "$ZIP" "packages/app/dist/Spool-${VERSION}-arm64-mac.zip"

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            packages/app/dist/Spool-*.dmg
            packages/app/dist/Spool-*-mac.zip
            packages/app/dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app (AppImage + tar.gz)
        run: |
          pnpm --filter @spool-lab/core build
          cd packages/app
          npx electron-vite build
          npx electron-builder --linux --publish never

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version packages/app/package.json)" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          APPIMAGE=$(find packages/app/dist -name "*.AppImage" | head -1)
          mv "$APPIMAGE" "packages/app/dist/Spool-${VERSION}-x86_64.AppImage"

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            packages/app/dist/Spool-*.AppImage
            packages/app/dist/latest-linux.yml

  release:
    needs: [build-mac, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version packages/app/package.json)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log "$PREV_TAG".."$TAG" --pretty=format:"- %s" --no-merges | grep -v "^- release:")
          else
            COMMITS=$(git log "$TAG" --pretty=format:"- %s" --no-merges -20 | grep -v "^- release:")
          fi
          {
            echo "## What's new"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Install"
            echo ""
            echo '**macOS (Apple Silicon)**'
            echo '```bash'
            echo 'curl -fsSL https://spool.pro/install.sh | bash'
            echo '```'
            echo ""
            echo '**Linux (x86_64)**'
            echo 'Download the AppImage from the assets below.'
            echo ""
            echo '> This is an early release — feedback and bug reports welcome via [Issues](https://github.com/spool-lab/spool/issues).'
          } > /tmp/release-notes.md

      - name: Upload to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          ASSETS=$(find artifacts -type f | tr '\n' ' ')
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $ASSETS --clobber
          else
            gh release create "$TAG" $ASSETS \
              --title "Spool ${{ steps.version.outputs.version }}" \
              --notes-file /tmp/release-notes.md
          fi
