name: Deploy Landing Page

# Manual-only while @void-sdk/* is in private beta. The landing package is
# excluded from the root pnpm workspace so contributors without a GitHub
# Packages token can still `pnpm install` at the repo root without 403.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@void-sdk"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        working-directory: packages/landing
        run: pnpm install

      - name: Deploy to Void
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: spool-landing
        working-directory: packages/landing
        run: pnpm run deploy
